name: Build and Deploy
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Update package-lock.json 🔒
        run: npm install --package-lock-only

      - name: Install Dependencies 📦
        run: npm ci

      - name: Build 🔧
        run: npm run build

      - name: Copy script-loader to root 📁
        run: cp dist/script-loader.js dist/

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@4.1.5
        with:
          branch: gh-pages
          folder: dist
          token: ${{ secrets.PAT }}